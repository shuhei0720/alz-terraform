name: Library Update Check

on:
  schedule:
    - cron: "0 0 * * 1" # 毎週月曜 09:00 JST (00:00 UTC)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    name: Check ALZ & AMBA Library Updates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check for Library Updates
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # policy.tf から現在のバージョンを抽出
          CURRENT_ALZ=$(grep -A2 'path = "platform/alz"' policy.tf | grep 'ref' | sed 's/.*"\(.*\)".*/\1/')
          CURRENT_AMBA=$(grep -A2 'path = "platform/amba"' policy.tf | grep 'ref' | sed 's/.*"\(.*\)".*/\1/')

          if [[ -z "$CURRENT_ALZ" || -z "$CURRENT_AMBA" ]]; then
            echo "::error::Failed to extract library versions from policy.tf"
            exit 1
          fi

          echo "Current ALZ:  $CURRENT_ALZ"
          echo "Current AMBA: $CURRENT_AMBA"

          # GitHub API から最新リリースタグを取得
          RELEASES=$(gh api repos/Azure/Azure-Landing-Zones-Library/releases --paginate --jq '.[].tag_name' | head -100)
          LATEST_ALZ=$(echo "$RELEASES" | grep '^platform/alz/' | head -1 | sed 's|platform/alz/||')
          LATEST_AMBA=$(echo "$RELEASES" | grep '^platform/amba/' | head -1 | sed 's|platform/amba/||')
          echo "Latest ALZ:   $LATEST_ALZ"
          echo "Latest AMBA:  $LATEST_AMBA"

          # 比較
          UPDATES=""
          [[ -n "$LATEST_ALZ"  && "$CURRENT_ALZ"  != "$LATEST_ALZ"  ]] && UPDATES+="- **ALZ**: \`$CURRENT_ALZ\` → \`$LATEST_ALZ\`"$'\n'
          [[ -n "$LATEST_AMBA" && "$CURRENT_AMBA" != "$LATEST_AMBA" ]] && UPDATES+="- **AMBA**: \`$CURRENT_AMBA\` → \`$LATEST_AMBA\`"$'\n'

          if [[ -n "$UPDATES" ]]; then
            echo "has_updates=true" >> "$GITHUB_OUTPUT"

            # テンプレートに変数を展開して Issue body を生成
            export UPDATES CURRENT_ALZ CURRENT_AMBA LATEST_ALZ LATEST_AMBA
            BODY=$(envsubst '${UPDATES} ${CURRENT_ALZ} ${CURRENT_AMBA} ${LATEST_ALZ} ${LATEST_AMBA}' < .github/ISSUE_TEMPLATE/library-update-body.md)
            BODY+=$'\n\n'"*検知日時: $(date -u +%Y-%m-%dT%H:%M:%SZ)*"

            # multiline output
            {
              echo "body<<ISSUE_BODY_EOF"
              echo "$BODY"
              echo "ISSUE_BODY_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            echo "All libraries are up to date"
          fi

      - name: Create or Update Issue
        if: steps.check.outputs.has_updates == 'true'
        uses: actions/github-script@v8
        env:
          ISSUE_BODY: ${{ steps.check.outputs.body }}
        with:
          script: |
            const title = '📦 ポリシーライブラリの更新があります';
            const label = 'library-update';
            const body = process.env.ISSUE_BODY;

            const { owner, repo } = context.repo;
            const issues = await github.rest.issues.listForRepo({ owner, repo, labels: label, state: 'open' });

            if (issues.data.length > 0) {
              await github.rest.issues.update({ owner, repo, issue_number: issues.data[0].number, body });
            } else {
              try { await github.rest.issues.createLabel({ owner, repo, name: label, color: '7057ff', description: 'ALZ/AMBA ポリシーライブラリの更新通知' }); } catch {}
              await github.rest.issues.create({ owner, repo, title, body, labels: [label] });
            }

      - name: Close Existing Issue (Up to date)
        if: steps.check.outputs.has_updates == 'false'
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const issues = await github.rest.issues.listForRepo({ owner, repo, labels: 'library-update', state: 'open' });
            for (const issue of issues.data) {
              await github.rest.issues.update({ owner, repo, issue_number: issue.number, state: 'closed', state_reason: 'completed' });
              await github.rest.issues.createComment({ owner, repo, issue_number: issue.number, body: '✅ ライブラリが最新バージョンに更新されました（自動クローズ）' });
            }
