name: Provider Major Version Check

on:
  schedule:
    - cron: "0 0 * * 1" # 毎週月曜 09:00 JST (00:00 UTC)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    name: Check Provider Major Version Updates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check for Major Version Updates
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # terraform.tf から現在のプロバイダー制約を抽出
          # 形式: provider_name|source|current_constraint|current_major
          declare -A PROVIDERS
          PROVIDERS=(
            ["azurerm"]="hashicorp/azurerm"
            ["azapi"]="azure/azapi"
            ["alz"]="azure/alz"
            ["time"]="hashicorp/time"
          )

          UPDATES=""
          CHANGELOG_LINKS=""

          for name in "${!PROVIDERS[@]}"; do
            source="${PROVIDERS[$name]}"

            # terraform.tf から現在の制約を抽出 (~> X.Y)
            current_constraint=$(grep -A1 "source.*=.*\"${source}\"" terraform.tf | grep 'version' | sed 's/.*"~> \([0-9]*\)\.\([0-9]*\)".*/\1/' || echo "")
            if [[ -z "$current_constraint" ]]; then
              echo "Warning: Could not extract version for $name"
              continue
            fi
            current_major="$current_constraint"

            # Terraform Registry API で最新バージョンを取得
            latest_version=$(curl -sf "https://registry.terraform.io/v1/providers/${source}" | grep -o '"version":"[^"]*"' | head -1 | sed 's/"version":"//;s/"//' || echo "")
            if [[ -z "$latest_version" ]]; then
              echo "Warning: Could not fetch latest version for $name"
              continue
            fi
            latest_major=$(echo "$latest_version" | cut -d. -f1)

            echo "$name: current ~> ${current_major}.0, latest ${latest_version} (major: ${latest_major})"

            if [[ "$latest_major" -gt "$current_major" ]]; then
              UPDATES+="- **${name}** (\`${source}\`): \`~> ${current_major}.0\` → 最新 \`${latest_version}\` (メジャー ${latest_major})"$'\n'

              # Changelog リンク生成
              case "$source" in
                hashicorp/*)
                  CHANGELOG_LINKS+="- [${name} ${latest_major}.0 Upgrade Guide](https://registry.terraform.io/providers/${source}/latest/docs/guides/${latest_major}.0-upgrade-guide)"$'\n' ;;
                azure/azapi)
                  CHANGELOG_LINKS+="- [${name} Releases](https://github.com/${source}/releases)"$'\n' ;;
                azure/alz)
                  CHANGELOG_LINKS+="- [${name} Releases](https://github.com/Azure/terraform-azurerm-avm-ptn-alz/releases)"$'\n' ;;
              esac
            fi
          done

          if [[ -n "$UPDATES" ]]; then
            echo "has_updates=true" >> "$GITHUB_OUTPUT"

            export UPDATES CHANGELOG_LINKS
            BODY=$(envsubst '${UPDATES} ${CHANGELOG_LINKS}' < .github/ISSUE_TEMPLATE/provider-major-update-body.md)
            BODY+=$'\n\n'"*検知日時: $(date -u +%Y-%m-%dT%H:%M:%SZ)*"

            {
              echo "body<<ISSUE_BODY_EOF"
              echo "$BODY"
              echo "ISSUE_BODY_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            echo "All providers are on the latest major version"
          fi

      - name: Create or Update Issue
        if: steps.check.outputs.has_updates == 'true'
        uses: actions/github-script@v8
        env:
          ISSUE_BODY: ${{ steps.check.outputs.body }}
        with:
          script: |
            const title = '🔄 プロバイダーのメジャーバージョン更新があります';
            const label = 'provider-major-update';
            const body = process.env.ISSUE_BODY;

            const { owner, repo } = context.repo;
            const issues = await github.rest.issues.listForRepo({ owner, repo, labels: label, state: 'open' });

            if (issues.data.length > 0) {
              await github.rest.issues.update({ owner, repo, issue_number: issues.data[0].number, body });
            } else {
              try { await github.rest.issues.createLabel({ owner, repo, name: label, color: 'e11d48', description: 'Terraform プロバイダーのメジャーバージョン更新通知' }); } catch {}
              await github.rest.issues.create({ owner, repo, title, body, labels: [label] });
            }

      - name: Close Existing Issue (Up to date)
        if: steps.check.outputs.has_updates == 'false'
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const issues = await github.rest.issues.listForRepo({ owner, repo, labels: 'provider-major-update', state: 'open' });
            for (const issue of issues.data) {
              await github.rest.issues.update({ owner, repo, issue_number: issue.number, state: 'closed', state_reason: 'completed' });
              await github.rest.issues.createComment({ owner, repo, issue_number: issue.number, body: '✅ すべてのプロバイダーが最新メジャーバージョンです（自動クローズ）' });
            }
