name: Terraform CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - apply
          - destroy

concurrency:
  group: terraform-state
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true

jobs:
  # ===========================================================================
  # Deploy: Plan → 承認 → Apply
  # ===========================================================================
  plan:
    name: Plan
    runs-on: ubuntu-latest
    if: github.event.inputs.action != 'destroy'
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.9"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.BACKEND_CONTAINER }}" \
            -backend-config="key=alz.terraform.tfstate"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -no-color -input=false -lock-timeout=60m -out=tfplan -detailed-exitcode 2>&1 | tee plan-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          if [[ $EXIT_CODE -eq 0 ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "### ✅ Plan: 変更なし" >> "$GITHUB_STEP_SUMMARY"
            echo "インフラは最新の状態です。apply はスキップされます。" >> "$GITHUB_STEP_SUMMARY"
          elif [[ $EXIT_CODE -eq 2 ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "### 📋 Plan: 変更あり — 承認待ち" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "以下の変更が apply されます。\`Apply\` ジョブの承認で適用してください。" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            # サマリー行（Plan: X to add, Y to change, Z to destroy）
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep -E '^Plan:|^Changes to Outputs' plan-output.txt >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            # リソース変更一覧
            echo "#### リソース変更一覧" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep -E '^  # .* (will be|must be)' plan-output.txt >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>📄 Plan 全文（クリックで展開）</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            head -c 65000 plan-output.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "### ❌ Plan: エラー" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -50 plan-output.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Upload Plan Artifact
        if: steps.plan.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
          retention-days: 1

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: needs.plan.outputs.has_changes == 'true'
    environment: azure

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.9"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.BACKEND_CONTAINER }}" \
            -backend-config="key=alz.terraform.tfstate"

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false -lock-timeout=60m tfplan

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Policy Remediation
        run: |
          # DINE/Modify ポリシーは新規リソースには自動適用されるが、
          # 既存リソースには修復タスクが必要。
          # identity を持つ割り当て = DINE/Modify を抽出し修復タスクを作成する。

          ROOT_MG=$(grep -oP 'root_id\s*=\s*"\K[^"]+' terraform.tfvars || true)
          if [[ -z "$ROOT_MG" ]]; then
            echo "::error::Could not determine root_id from terraform.tfvars — skipping remediation"
            exit 0
          fi

          echo "::notice::Creating remediation tasks for DINE/Modify policies (root MG: $ROOT_MG)"

          # 全管理グループ配下の DINE 割り当てを取得（identity 付き = DINE/Modify）
          # --disable-scope-strict-match: 子管理グループ配下の割り当ても含める
          ASSIGNMENTS=$(az policy assignment list \
            --scope "/providers/Microsoft.Management/managementGroups/$ROOT_MG" \
            --disable-scope-strict-match \
            --query "[?identity.type].{name:name, id:id, policyDefinitionId:policyDefinitionId, scope:scope}" \
            -o json)

          COUNT=$(echo "$ASSIGNMENTS" | jq 'length')
          echo "  Found $COUNT DINE/Modify assignments"

          if [[ "$COUNT" -eq 0 ]]; then
            echo "::notice::No DINE/Modify assignments found — nothing to remediate"
            exit 0
          fi

          CREATED=0
          FAILED=0

          echo "$ASSIGNMENTS" | jq -c '.[]' | while IFS= read -r ITEM; do
            NAME=$(echo "$ITEM" | jq -r '.name')
            ID=$(echo "$ITEM" | jq -r '.id')
            POLICY_DEF=$(echo "$ITEM" | jq -r '.policyDefinitionId')
            SCOPE=$(echo "$ITEM" | jq -r '.scope')
            MG_NAME=$(echo "$SCOPE" | grep -oP 'managementGroups/\K[^/]+' || echo "$ROOT_MG")
            TS=$(date +%Y%m%d%H%M)

            if [[ "$POLICY_DEF" == */policySetDefinitions/* ]]; then
              # イニシアティブ: メンバーポリシーごとに修復タスクを作成
              SET_NAME=$(basename "$POLICY_DEF")
              REFS=$(az policy set-definition show \
                --name "$SET_NAME" \
                --management-group "$ROOT_MG" \
                --query "policyDefinitions[].policyDefinitionReferenceId" \
                -o tsv 2>&1) || {
                echo "  ⚠ $NAME: could not list initiative members — skipping"
                echo "    Error: $REFS"
                continue
              }

              if [[ -z "$REFS" ]]; then
                echo "  ⚠ $NAME: initiative has no member references — skipping"
                continue
              fi

              REF_COUNT=$(echo "$REFS" | wc -l)
              echo "  $NAME (initiative, $REF_COUNT members)"
              echo "$REFS" | while IFS= read -r REF; do
                if az policy remediation create \
                  --name "rem-${NAME}-${REF}-${TS}" \
                  --management-group "$MG_NAME" \
                  --policy-assignment "$ID" \
                  --definition-reference-id "$REF" \
                  --resource-discovery-mode ReEvaluateCompliance \
                  -o none --no-wait 2>&1; then
                  CREATED=$((CREATED + 1))
                else
                  echo "    ⚠ Failed to create remediation for $REF"
                  FAILED=$((FAILED + 1))
                fi
              done
            else
              # 単一ポリシー: 直接修復
              echo "  $NAME (single policy)"
              if az policy remediation create \
                --name "rem-${NAME}-${TS}" \
                --management-group "$MG_NAME" \
                --policy-assignment "$ID" \
                --resource-discovery-mode ReEvaluateCompliance \
                -o none --no-wait 2>&1; then
                CREATED=$((CREATED + 1))
              else
                echo "    ⚠ Failed to create remediation for $NAME"
                FAILED=$((FAILED + 1))
              fi
            fi
          done

          echo "::notice::Remediation complete — created: $CREATED, failed: $FAILED"

  # ===========================================================================
  # Destroy: Plan -destroy → 承認 → Destroy
  # ===========================================================================
  plan-destroy:
    name: Plan Destroy
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'destroy'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.9"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.BACKEND_CONTAINER }}" \
            -backend-config="key=alz.terraform.tfstate"

      - name: Terraform Plan Destroy
        run: |
          echo "### ⚠️ Destroy Plan — 以下のリソースが削除されます" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**\`Destroy\` ジョブの承認で削除が実行されます。**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          terraform plan -destroy -no-color -input=false -lock-timeout=60m 2>&1 | tee plan-destroy-output.txt

          # サマリー行（Plan: X to add, Y to change, Z to destroy）
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -E '^Plan:|^Changes to Outputs' plan-destroy-output.txt >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          # 削除対象リソース一覧
          echo "#### 削除対象リソース一覧" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -E '^  # .* (will be|must be)' plan-destroy-output.txt >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details><summary>📄 Destroy Plan 全文（クリックで展開）</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          head -c 65000 plan-destroy-output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

  destroy:
    name: Destroy
    runs-on: ubuntu-latest
    needs: plan-destroy
    environment: azure
    if: github.event.inputs.action == 'destroy'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.9"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.BACKEND_CONTAINER }}" \
            -backend-config="key=alz.terraform.tfstate"

      - name: Pre-Destroy Cleanup
        run: |
          set +e +o pipefail
          # WORM (バージョンレベル不変性) 有効な Storage Account は terraform destroy で削除不可
          # (AccountProtectedFromDeletion) のため、事前にクリーンアップする

          # SA 名・RG 名を特定（state → tfvars フォールバック）
          SA_ID=$(terraform state list 2>/dev/null | grep 'azurerm_storage_account.law_archive' || true)
          if [[ -n "$SA_ID" ]]; then
            SA_NAME=$(terraform state show "$SA_ID" | grep '^\s*name\s' | head -1 | awk -F'"' '{print $2}')
            RG_NAME=$(terraform state show "$SA_ID" | grep '^\s*resource_group_name\s' | awk -F'"' '{print $2}')
          else
            LOCATION=$(grep -oP 'primary_location\s*=\s*"\K[^"]+' terraform.tfvars 2>/dev/null || echo "")
            [[ -n "$LOCATION" ]] && SA_NAME="stlawarchive${LOCATION// /}" && RG_NAME="rg-management-${LOCATION// /}"
          fi

          if [[ -z "$SA_NAME" ]]; then
            echo "Could not determine Storage Account name — skipping"
            exit 0
          fi

          if ! az storage account show -n "$SA_NAME" -g "$RG_NAME" -o none 2>/dev/null; then
            echo "Storage Account $SA_NAME not found in Azure"
            for res in $(terraform state list 2>/dev/null | grep 'law_archive'); do
              terraform state rm "$res" || true
            done
            exit 0
          fi

          echo "::notice::Cleaning up WORM-protected Storage Account: $SA_NAME"

          # パブリックアクセス有効化（データプレーン操作に必要）
          az storage account update -n "$SA_NAME" -g "$RG_NAME" \
            --public-network-access Enabled --output none
          sleep 10

          # アカウントキー取得
          KEY=$(az storage account keys list -n "$SA_NAME" -g "$RG_NAME" \
            --query "[0].value" -o tsv)

          # ソフトデリート無効化
          az storage account blob-service-properties update \
            --account-name "$SA_NAME" -g "$RG_NAME" \
            --enable-delete-retention false \
            --enable-container-delete-retention false \
            --output none 2>/dev/null || true

          # Blob 不変性ポリシー削除 + Blob 削除（az CLI は --version-id 非対応のため REST API 使用）
          CONTAINERS=$(az storage container list --account-name "$SA_NAME" \
            --account-key "$KEY" --query "[].name" -o tsv 2>/dev/null || echo "")
          if [[ -n "$CONTAINERS" ]]; then
            python3 - "$SA_NAME" "$KEY" "$CONTAINERS" << 'PYEOF'
          import json, subprocess, sys, hmac, hashlib, base64
          import urllib.request, urllib.parse, urllib.error
          from datetime import datetime, timezone

          acct, key_b64, containers = sys.argv[1], sys.argv[2], sys.argv[3].split()
          key_bytes = base64.b64decode(key_b64)

          def rest_delete(container, blob, params):
              path = f"/{container}/{urllib.parse.quote(blob, safe='/')}"
              now = datetime.now(timezone.utc).strftime("%a, %d %b %Y %H:%M:%S GMT")
              hdrs = {"x-ms-date": now, "x-ms-version": "2021-12-02"}
              canon = "".join(f"{k}:{v}\n" for k, v in sorted(hdrs.items()))
              res = f"/{acct}{path}" + "".join(f"\n{k}:{v}" for k, v in sorted(params.items()))
              sig = base64.b64encode(hmac.new(key_bytes,
                  f"DELETE\n\n\n\n\n\n\n\n\n\n\n\n{canon}{res}".encode(), hashlib.sha256
              ).digest()).decode()
              hdrs["Authorization"] = f"SharedKey {acct}:{sig}"
              qs = "&".join(f"{k}={v}" for k, v in params.items())
              url = f"https://{acct}.blob.core.windows.net{path}{'?' + qs if qs else ''}"
              try:
                  urllib.request.urlopen(urllib.request.Request(url, method="DELETE", headers=hdrs))
              except urllib.error.HTTPError:
                  pass

          for c in containers:
              r = subprocess.run(
                  ["az", "storage", "blob", "list", "--account-name", acct, "-c", c,
                   "--account-key", key_b64, "--include", "v",
                   "--query", "[].{name:name,versionId:versionId}", "-o", "json"],
                  capture_output=True, text=True)
              blobs = json.loads(r.stdout) if r.returncode == 0 else []
              for b in blobs:
                  name, ver = b["name"], b.get("versionId") or ""
                  if ver:
                      rest_delete(c, name, {"comp": "immutabilityPolicies", "versionid": ver})
                      rest_delete(c, name, {"versionid": ver})
                  else:
                      subprocess.run(["az", "storage", "blob", "immutability-policy", "delete",
                          "-c", c, "-n", name, "--account-name", acct, "--account-key", key_b64],
                          capture_output=True)
                      subprocess.run(["az", "storage", "blob", "delete",
                          "-c", c, "-n", name, "--account-name", acct, "--account-key", key_b64],
                          capture_output=True)
              print(f"  Container {c}: {len(blobs)} blob(s) cleaned")
          PYEOF
          fi

          # コンテナ削除（管理プレーン — データプレーンでは不変性有効コンテナ削除不可）
          for C in $CONTAINERS; do
            az storage container-rm delete \
              --storage-account "$SA_NAME" -g "$RG_NAME" -n "$C" --yes 2>&1 || true
          done

          # Storage Account 削除
          az storage account delete -n "$SA_NAME" -g "$RG_NAME" --yes 2>&1
          sleep 5
          if az storage account show -n "$SA_NAME" -g "$RG_NAME" -o none 2>/dev/null; then
            echo "::error::Storage Account $SA_NAME still exists — manual intervention required"
          else
            echo "::notice::Storage Account $SA_NAME deleted"
          fi

          # state から law_archive 関連リソースを除外
          for res in $(terraform state list 2>/dev/null | grep 'law_archive'); do
            terraform state rm "$res" || true
          done

      - name: Terraform Destroy
        run: |
          terraform destroy -auto-approve -input=false -lock-timeout=60m || \
          terraform destroy -auto-approve -input=false -lock-timeout=60m -refresh=false
