name: Terraform CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - apply
          - destroy

concurrency:
  group: terraform-state
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true

jobs:
  # ===========================================================================
  # Deploy: Plan → 承認 → Apply
  # ===========================================================================
  plan:
    name: Plan
    runs-on: ubuntu-latest
    if: github.event.inputs.action != 'destroy'
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_version: "~> 1.12"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.BACKEND_CONTAINER }}" \
            -backend-config="key=alz.terraform.tfstate"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -no-color -input=false -lock-timeout=60m -out=tfplan -detailed-exitcode 2>&1 | tee plan-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          if [[ $EXIT_CODE -eq 0 ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "### ✅ Plan: 変更なし" >> "$GITHUB_STEP_SUMMARY"
            echo "インフラは最新の状態です。apply はスキップされます。" >> "$GITHUB_STEP_SUMMARY"
          elif [[ $EXIT_CODE -eq 2 ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "### 📋 Plan: 変更あり — 承認待ち" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "以下の変更が apply されます。\`Apply\` ジョブの承認で適用してください。" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            # サマリー行（Plan: X to add, Y to change, Z to destroy）
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep -E '^Plan:|^Changes to Outputs' plan-output.txt >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            # リソース変更一覧
            echo "#### リソース変更一覧" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep -E '^  # .* (will be|must be)' plan-output.txt >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>📄 Plan 全文（クリックで展開）</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            head -c 65000 plan-output.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "### ❌ Plan: エラー" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -50 plan-output.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Upload Plan Artifact
        if: steps.plan.outputs.has_changes == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: tfplan
          path: tfplan
          retention-days: 1

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: needs.plan.outputs.has_changes == 'true'
    environment: azure

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_version: "~> 1.12"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.BACKEND_CONTAINER }}" \
            -backend-config="key=alz.terraform.tfstate"

      - name: Download Plan Artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false -lock-timeout=60m tfplan

  # ===========================================================================
  # Destroy: Plan -destroy → 承認 → Destroy
  # ===========================================================================
  plan-destroy:
    name: Plan Destroy
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'destroy'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_version: "~> 1.12"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.BACKEND_CONTAINER }}" \
            -backend-config="key=alz.terraform.tfstate"

      - name: Terraform Plan Destroy
        run: |
          echo "### ⚠️ Destroy Plan — 以下のリソースが削除されます" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**\`Destroy\` ジョブの承認で削除が実行されます。**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          terraform plan -destroy -no-color -input=false -lock-timeout=60m 2>&1 | tee plan-destroy-output.txt

          # サマリー行（Plan: X to add, Y to change, Z to destroy）
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -E '^Plan:|^Changes to Outputs' plan-destroy-output.txt >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          # 削除対象リソース一覧
          echo "#### 削除対象リソース一覧" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -E '^  # .* (will be|must be)' plan-destroy-output.txt >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details><summary>📄 Destroy Plan 全文（クリックで展開）</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          head -c 65000 plan-destroy-output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

  destroy:
    name: Destroy
    runs-on: ubuntu-latest
    needs: plan-destroy
    environment: azure
    if: github.event.inputs.action == 'destroy'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_version: "~> 1.12"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.BACKEND_CONTAINER }}" \
            -backend-config="key=alz.terraform.tfstate"

      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Pre-Destroy Cleanup
        continue-on-error: true
        env:
          BLOB_LIST_PY: |
            import json, sys, urllib.parse
            for b in json.load(sys.stdin):
                vid = b.get('versionId', '')
                name = b['name']
                enc_name = urllib.parse.quote(name, safe='/=')
                enc_vid = urllib.parse.quote(vid, safe='') if vid else ''
                print(f'{enc_vid}\t{enc_name}')
        run: |
          set +e +o pipefail

          # ---------------------------------------------------------------
          # DenyAction ポリシー削除 — UAMI 等の削除をブロックする DenyAction
          # ポリシーを事前に解除する。Terraform refresh で消滅検知されるため
          # terraform destroy 側で二重削除エラーにはならない。
          # ---------------------------------------------------------------
          echo "::group::DenyAction policy cleanup"
          ROOT_ID=$(grep -oP 'root_id\s*=\s*"\K[^"]+' terraform.tfvars 2>/dev/null || echo "alz")
          DENY_ASSIGNMENTS=$(az policy assignment list \
            --scope "/providers/Microsoft.Management/managementGroups/${ROOT_ID}" \
            --query "[?contains(name,'DenyAction')].{name:name,scope:scope}" -o json 2>/dev/null || echo "[]")
          echo "$DENY_ASSIGNMENTS" | jq -r '.[] | "\(.scope)/providers/Microsoft.Authorization/policyAssignments/\(.name)"' | \
          while IFS= read -r ASSIGNMENT_ID; do
            echo "Deleting DenyAction: $ASSIGNMENT_ID"
            az policy assignment delete --name "$(basename "$ASSIGNMENT_ID")" \
              --scope "$(echo "$ASSIGNMENT_ID" | sed 's|/providers/Microsoft.Authorization/policyAssignments/.*||')" 2>/dev/null || true
          done
          echo "::endgroup::"

          # ---------------------------------------------------------------
          # WORM Storage Account クリーンアップ
          # ---------------------------------------------------------------
          # WORM (バージョンレベル不変性) 有効な Storage Account は terraform destroy で削除不可
          # (AccountProtectedFromDeletion) のため、事前にクリーンアップする

          # SA 名・RG 名を特定（state → tfvars フォールバック）
          SA_ID=$(terraform state list 2>/dev/null | grep 'azurerm_storage_account.law_archive' || true)
          if [[ -n "$SA_ID" ]]; then
            SA_NAME=$(terraform state show "$SA_ID" | grep '^\s*name\s' | head -1 | awk -F'"' '{print $2}')
            RG_NAME=$(terraform state show "$SA_ID" | grep '^\s*resource_group_name\s' | awk -F'"' '{print $2}')
          else
            LOCATION=$(grep -oP 'primary_location\s*=\s*"\K[^"]+' terraform.tfvars 2>/dev/null || echo "")
            [[ -n "$LOCATION" ]] && SA_NAME="stlawarchive${LOCATION// /}" && RG_NAME="rg-management-${LOCATION// /}"
          fi

          if [[ -z "$SA_NAME" ]]; then
            echo "Could not determine Storage Account name — skipping"
            exit 0
          fi

          if ! az account show -o none 2>/dev/null; then
            echo "::error::az CLI is not authenticated — cannot perform pre-destroy cleanup"
            exit 1
          fi

          if ! az storage account show -n "$SA_NAME" -g "$RG_NAME" -o none 2>/dev/null; then
            echo "Storage Account $SA_NAME not found in Azure"
            for res in $(terraform state list 2>/dev/null | grep 'law_archive\|law_data_export'); do
              terraform state rm "$res" || true
            done
            exit 0
          fi

          echo "::notice::Cleaning up WORM-protected Storage Account: $SA_NAME"

          # 1. Data Export Rule を先に削除（新規 Blob 書き込みを停止）
          LAW_NAME=$(terraform state show 'azurerm_log_analytics_workspace.main' 2>/dev/null \
            | grep '^\s*name\s' | head -1 | awk -F'"' '{print $2}')
          if [[ -n "$LAW_NAME" ]]; then
            echo "Deleting Data Export Rule on $LAW_NAME..."
            az monitor log-analytics workspace data-export delete \
              --resource-group "$RG_NAME" \
              --workspace-name "$LAW_NAME" \
              --name "export-to-archive" --yes 2>/dev/null || true
            echo "Waiting 60s for in-flight export operations to complete..."
            sleep 60
          fi

          # 2. パブリックアクセス有効化 + アカウントキー取得
          az storage account update -n "$SA_NAME" -g "$RG_NAME" \
            --public-network-access Enabled --output none
          sleep 10
          KEY=$(az storage account keys list -n "$SA_NAME" -g "$RG_NAME" \
            --query "[0].value" -o tsv)

          # 3. ソフトデリート無効化（バージョニングは Blob 操作完了後に無効化）
          az storage account blob-service-properties update \
            --account-name "$SA_NAME" -g "$RG_NAME" \
            --enable-delete-retention false \
            --enable-container-delete-retention false \
            --output none 2>/dev/null || true

          # 4. Blob の不変性ポリシー解除 + 全削除 (REST API, リトライ付き)
          #    - --include vd: versions(v) + soft-deleted(d) を含む全 Blob を対象
          #    - リトライ: Data Export のインフライト書き込みで後から Blob が現れる場合に対応
          #    - 3 パス: 不変性解除 → Blob/version 削除 → ソフトデリート永久削除
          #    - SAS 権限: dlrwixy (x=permanent delete が必要)
          SAS=$(az storage account generate-sas \
            --account-name "$SA_NAME" --account-key "$KEY" \
            --permissions dlrwixy --services b --resource-types sco \
            --expiry "$(date -u -d '+2 hours' '+%Y-%m-%dT%H:%MZ')" -o tsv)
          BLOB_EP="https://${SA_NAME}.blob.core.windows.net"
          API_VER="x-ms-version: 2021-12-02"

          CONTAINERS=$(az storage container list --account-name "$SA_NAME" \
            --account-key "$KEY" --query "[].name" -o tsv 2>/dev/null || echo "")

          MAX_ATTEMPTS=5
          RETRY_DELAY=30

          for C in $CONTAINERS; do
            echo "  Processing container: $C"

            for ATTEMPT in $(seq 1 $MAX_ATTEMPTS); do
              # 毎回再リスト（インフライト書き込みで後から現れる Blob を捕捉）
              BLOBS=$(az storage blob list -c "$C" --account-name "$SA_NAME" \
                --account-key "$KEY" --include vd --num-results '*' -o json 2>/dev/null || echo "[]")
              TOTAL=$(echo "$BLOBS" | jq length)

              if [[ "$TOTAL" -eq 0 ]]; then
                echo "    Container $C is empty"
                break
              fi

              echo "    Attempt $ATTEMPT/$MAX_ATTEMPTS: $TOTAL blobs to process"

              BLOB_LIST=$(echo "$BLOBS" | python3 -c "$BLOB_LIST_PY" 2>/dev/null || true)
              [[ -z "$BLOB_LIST" ]] && break

              # --- Pass 1: 不変性ポリシー削除（root + version） ---
              echo "    Pass 1: Removing immutability policies ..."
              echo "$BLOB_LIST" | while IFS=$'\t' read -r ENC_VID ENC_NAME; do
                [[ -z "$ENC_NAME" ]] && continue
                curl -s -o /dev/null -X DELETE \
                  "${BLOB_EP}/${C}/${ENC_NAME}?comp=immutabilityPolicies&${SAS}" \
                  -H "$API_VER" 2>/dev/null || true
                [[ -n "$ENC_VID" ]] && curl -s -o /dev/null -X DELETE \
                  "${BLOB_EP}/${C}/${ENC_NAME}?comp=immutabilityPolicies&versionid=${ENC_VID}&${SAS}" \
                  -H "$API_VER" 2>/dev/null || true
              done

              # --- Pass 2: root blob + version 削除 ---
              echo "    Pass 2: Deleting blobs and versions ..."
              echo "$BLOB_LIST" | while IFS=$'\t' read -r ENC_VID ENC_NAME; do
                [[ -z "$ENC_NAME" ]] && continue
                curl -s -o /dev/null -X DELETE \
                  "${BLOB_EP}/${C}/${ENC_NAME}?${SAS}" \
                  -H "$API_VER" 2>/dev/null || true
                [[ -n "$ENC_VID" ]] && curl -s -o /dev/null -X DELETE \
                  "${BLOB_EP}/${C}/${ENC_NAME}?versionid=${ENC_VID}&${SAS}" \
                  -H "$API_VER" 2>/dev/null || true
              done

              # --- Pass 3: ソフトデリート済み Blob の永久削除 ---
              echo "    Pass 3: Permanently deleting soft-deleted blobs ..."
              echo "$BLOB_LIST" | while IFS=$'\t' read -r ENC_VID ENC_NAME; do
                [[ -z "$ENC_NAME" ]] && continue
                curl -s -o /dev/null -X DELETE \
                  "${BLOB_EP}/${C}/${ENC_NAME}?deletetype=permanent&${SAS}" \
                  -H "$API_VER" 2>/dev/null || true
                [[ -n "$ENC_VID" ]] && curl -s -o /dev/null -X DELETE \
                  "${BLOB_EP}/${C}/${ENC_NAME}?versionid=${ENC_VID}&deletetype=permanent&${SAS}" \
                  -H "$API_VER" 2>/dev/null || true
              done

              # 残留確認
              REMAINING=$(az storage blob list -c "$C" --account-name "$SA_NAME" \
                --account-key "$KEY" --include vd --num-results '*' --query "length(@)" -o tsv 2>/dev/null || echo "0")
              echo "    Attempt $ATTEMPT: $REMAINING blobs remaining"

              if [[ "$REMAINING" == "0" ]]; then
                break
              fi

              if [[ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]]; then
                echo "    Waiting ${RETRY_DELAY}s before retry..."
                sleep $RETRY_DELAY
              fi
            done
          done

          # 5. バージョニング無効化
          az storage account blob-service-properties update \
            --account-name "$SA_NAME" -g "$RG_NAME" \
            --enable-versioning false \
            --output none 2>/dev/null || true

          # 6. コンテナ削除（リトライ付き）
          for C in $CONTAINERS; do
            for i in 1 2 3; do
              az storage container-rm delete \
                --storage-account "$SA_NAME" -g "$RG_NAME" -n "$C" --yes 2>/dev/null && break
              echo "    Container $C delete attempt $i failed — retrying in 10s..."
              sleep 10
            done
          done

          # 7. Storage Account 削除
          az storage account delete -n "$SA_NAME" -g "$RG_NAME" --yes 2>&1 || true
          sleep 5
          if az storage account show -n "$SA_NAME" -g "$RG_NAME" -o none 2>/dev/null; then
            echo "::warning::Storage Account $SA_NAME still exists — removing from state (orphaned in Azure)"
          else
            echo "::notice::Storage Account $SA_NAME deleted"
          fi

          # 8. state から law_archive + data_export 関連リソースを除外（常に実行）
          for res in $(terraform state list 2>/dev/null | grep 'law_archive\|law_data_export'); do
            terraform state rm "$res" || true
          done

      - name: Terraform Destroy
        run: |
          terraform destroy -auto-approve -input=false -lock-timeout=60m || \
          terraform destroy -auto-approve -input=false -lock-timeout=60m -refresh=false
