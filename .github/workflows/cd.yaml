name: Terraform CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - apply
          - destroy

concurrency:
  group: terraform-state
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true

jobs:
  # ===========================================================================
  # Deploy: Plan → 承認 → Apply
  # ===========================================================================
  plan:
    name: Plan
    runs-on: ubuntu-latest
    if: github.event.inputs.action != 'destroy'
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.9"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.BACKEND_CONTAINER }}" \
            -backend-config="key=alz.terraform.tfstate"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -no-color -input=false -lock-timeout=60m -out=tfplan -detailed-exitcode 2>&1 | tee plan-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          if [[ $EXIT_CODE -eq 0 ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "### ✅ Plan: 変更なし" >> "$GITHUB_STEP_SUMMARY"
            echo "インフラは最新の状態です。apply はスキップされます。" >> "$GITHUB_STEP_SUMMARY"
          elif [[ $EXIT_CODE -eq 2 ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "### 📋 Plan: 変更あり — 承認待ち" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "以下の変更が apply されます。\`Apply\` ジョブの承認で適用してください。" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            # サマリー行（Plan: X to add, Y to change, Z to destroy）
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep -E '^Plan:|^Changes to Outputs' plan-output.txt >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            # リソース変更一覧
            echo "#### リソース変更一覧" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep -E '^  # .* (will be|must be)' plan-output.txt >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>📄 Plan 全文（クリックで展開）</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            head -c 65000 plan-output.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "### ❌ Plan: エラー" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -50 plan-output.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Upload Plan Artifact
        if: steps.plan.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
          retention-days: 1

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: needs.plan.outputs.has_changes == 'true'
    environment: azure

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.9"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.BACKEND_CONTAINER }}" \
            -backend-config="key=alz.terraform.tfstate"

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false -lock-timeout=60m tfplan

  # ===========================================================================
  # Destroy: Plan -destroy → 承認 → Destroy
  # ===========================================================================
  plan-destroy:
    name: Plan Destroy
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'destroy'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.9"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.BACKEND_CONTAINER }}" \
            -backend-config="key=alz.terraform.tfstate"

      - name: Terraform Plan Destroy
        run: |
          echo "### ⚠️ Destroy Plan — 以下のリソースが削除されます" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**\`Destroy\` ジョブの承認で削除が実行されます。**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          terraform plan -destroy -no-color -input=false -lock-timeout=60m 2>&1 | tee plan-destroy-output.txt

          # サマリー行（Plan: X to add, Y to change, Z to destroy）
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -E '^Plan:|^Changes to Outputs' plan-destroy-output.txt >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          # 削除対象リソース一覧
          echo "#### 削除対象リソース一覧" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -E '^  # .* (will be|must be)' plan-destroy-output.txt >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details><summary>📄 Destroy Plan 全文（クリックで展開）</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          head -c 65000 plan-destroy-output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

  destroy:
    name: Destroy
    runs-on: ubuntu-latest
    needs: plan-destroy
    environment: azure
    if: github.event.inputs.action == 'destroy'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.9"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.BACKEND_CONTAINER }}" \
            -backend-config="key=alz.terraform.tfstate"

      - name: Pre-Destroy Cleanup
        run: |
          set +e +o pipefail
          # バージョンレベル不変性が有効な Storage Account は terraform destroy で削除不可
          # (AccountProtectedFromDeletion) のため、事前に以下の手順で完全クリーンアップする:
          #   1. パブリックアクセスを有効化（データプレーン操作に必要）
          #   2. アカウントキーを取得（Contributor ロールで可能、データプレーン RBAC 不要）
          #   3. ソフトデリート無効化 → Blob 不変性ポリシー削除 → Blob 削除
          #   4. Storage Account 削除 → 確認
          #   5. terraform state から law_archive 関連リソースを除外
          SA_ID=$(terraform state list | grep 'azurerm_storage_account.law_archive' || true)
          if [[ -z "$SA_ID" ]]; then
            echo "No law_archive Storage Account in state — skipping"
            exit 0
          fi

          SA_NAME=$(terraform state show "$SA_ID" | grep '^\s*name\s' | head -1 | awk -F'"' '{print $2}')
          RG_NAME=$(terraform state show "$SA_ID" | grep '^\s*resource_group_name\s' | awk -F'"' '{print $2}')
          echo "::notice::Cleaning up immutability-protected Storage Account: $SA_NAME (RG: $RG_NAME)"

          # Azure 上に存在するか確認
          if ! az storage account show -n "$SA_NAME" -g "$RG_NAME" -o none 2>/dev/null; then
            echo "Storage Account not found in Azure — removing from state only"
            for res in $(terraform state list | grep 'law_archive'); do
              terraform state rm "$res" || true
            done
            exit 0
          fi

          # [1/5] パブリックアクセスを有効化（データプレーン操作に必要）
          echo "  [1/5] Enabling public network access..."
          az storage account update -n "$SA_NAME" -g "$RG_NAME" \
            --public-network-access Enabled --output none
          sleep 10

          # [2/5] アカウントキーを取得
          echo "  [2/5] Retrieving account key..."
          KEY=$(az storage account keys list -n "$SA_NAME" -g "$RG_NAME" \
            --query "[0].value" -o tsv)

          if [[ -n "$KEY" ]]; then
            # ソフトデリートを無効化（削除した Blob が残留しないように）
            az storage account blob-service-properties update \
              --account-name "$SA_NAME" -g "$RG_NAME" \
              --delete-retention-days 0 --enable-delete-retention false \
              --enable-container-delete-retention false \
              --output none 2>/dev/null || true

            # [3/5] 全 Blob の不変性ポリシーを削除し Blob を削除
            echo "  [3/5] Clearing blob immutability policies and deleting blobs..."
            CONTAINERS=$(az storage container list --account-name "$SA_NAME" \
              --account-key "$KEY" --query "[].name" -o tsv 2>/dev/null || echo "")
            for C in $CONTAINERS; do
              echo "    Container: $C"
              BLOBS=$(az storage blob list --account-name "$SA_NAME" -c "$C" \
                --account-key "$KEY" --include v \
                --query "[].{name:name,versionId:versionId}" -o tsv 2>/dev/null || echo "")
              COUNT=0
              while IFS=$'\t' read -r NAME VER; do
                [[ -z "$NAME" ]] && continue
                VER_ARGS=()
                [[ -n "$VER" ]] && VER_ARGS=(--version-id "$VER")
                az storage blob immutability-policy delete \
                  --account-name "$SA_NAME" -c "$C" -b "$NAME" "${VER_ARGS[@]}" \
                  --account-key "$KEY" 2>/dev/null || true
                az storage blob delete \
                  --account-name "$SA_NAME" -c "$C" -n "$NAME" "${VER_ARGS[@]}" \
                  --account-key "$KEY" 2>/dev/null || true
                COUNT=$((COUNT + 1))
              done <<< "$BLOBS"
              echo "    Processed $COUNT blob(s)/version(s)"
            done
          fi

          # [4/5] Storage Account を削除
          echo "  [4/5] Deleting Storage Account..."
          az storage account delete -n "$SA_NAME" -g "$RG_NAME" --yes 2>&1

          # 削除結果を確認
          sleep 5
          if az storage account show -n "$SA_NAME" -g "$RG_NAME" -o none 2>/dev/null; then
            echo "::error::Storage Account $SA_NAME still exists after cleanup"
            echo "::error::RG deletion will likely timeout — manual intervention required"
          else
            echo "::notice::Storage Account $SA_NAME confirmed deleted"
          fi

          # [5/5] terraform state から archive 関連リソースを除外
          echo "  [5/5] Removing law_archive resources from state..."
          for res in $(terraform state list | grep 'law_archive'); do
            echo "    Removing: $res"
            terraform state rm "$res" || true
          done

      - name: Terraform Destroy
        run: |
          terraform destroy -auto-approve -input=false -lock-timeout=60m || \
          terraform destroy -auto-approve -input=false -lock-timeout=60m -refresh=false
