name: Dependency Check

on:
  pull_request:
    branches: [main]
    paths:
      - ".terraform.lock.hcl"
      - "terraform.tf"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true

jobs:
  check:
    name: Validate Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Checkout base branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_version: "~> 1.12"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.BACKEND_CONTAINER }}" \
            -backend-config="key=alz.terraform.tfstate"

      - name: Terraform Validate
        run: terraform validate

      - name: Analyze Provider Changes
        id: analyze
        run: |
          set -euo pipefail

          # ==============================================================
          # base гҒЁ PR гҒ® lock file гҒӢгӮүгғ—гғӯгғҗгӮӨгғҖгғјгғҗгғјгӮёгғ§гғігӮ’жҠҪеҮәгҒ—гҒҰжҜ”ијғ
          # ==============================================================
          extract_versions() {
            local file="$1"
            grep -E '^\s*version\s*=' "$file" | sed 's/.*= *"\(.*\)"/\1/' || true
          }
          extract_providers() {
            local file="$1"
            grep -E '^\s*"[^"]+/[^"]+/[^"]+"' "$file" | sed 's/.*"\(.*\)".*/\1/' || true
          }

          BASE_LOCK="base/.terraform.lock.hcl"
          PR_LOCK=".terraform.lock.hcl"

          # lock file гҒҢ base гҒ«еӯҳеңЁгҒ—гҒӘгҒ„е ҙеҗҲпјҲж–°иҰҸиҝҪеҠ пјү
          if [[ ! -f "$BASE_LOCK" ]]; then
            echo "status=new" >> "$GITHUB_OUTPUT"
            echo "Lock file is newly added in this PR"
          else
            # гғ—гғӯгғҗгӮӨгғҖгғјгҒ”гҒЁгҒ«гғҗгғјгӮёгғ§гғіе·®еҲҶгӮ’з”ҹжҲҗ
            REPORT=""
            RISK="none"

            mapfile -t PR_PROVIDERS < <(extract_providers "$PR_LOCK")
            for provider in "${PR_PROVIDERS[@]}"; do
              BASE_VER=$(awk "/\"$provider\"/{found=1} found && /version/{print; found=0}" "$BASE_LOCK" \
                | head -1 | sed 's/.*= *"\(.*\)"/\1/')
              PR_VER=$(awk "/\"$provider\"/{found=1} found && /version/{print; found=0}" "$PR_LOCK" \
                | head -1 | sed 's/.*= *"\(.*\)"/\1/')

              if [[ -z "$BASE_VER" ]]; then
                REPORT+="| \`$provider\` | (ж–°иҰҸиҝҪеҠ ) | \`$PR_VER\` | рҹҶ• ж–°иҰҸ |"$'\n'
                [[ "$RISK" == "none" ]] && RISK="low"
              elif [[ "$BASE_VER" != "$PR_VER" ]]; then
                # SemVer еҲҶи§ЈгҒ§еӨүжӣҙзЁ®еҲҘгӮ’еҲӨе®ҡ
                IFS='.' read -r B_MAJ B_MIN B_PAT <<< "$BASE_VER"
                IFS='.' read -r P_MAJ P_MIN P_PAT <<< "$PR_VER"
                if [[ "$B_MAJ" != "$P_MAJ" ]]; then
                  CHANGE="рҹ”ҙ гғЎгӮёгғЈгғј"; RISK="high"
                elif [[ "$B_MIN" != "$P_MIN" ]]; then
                  CHANGE="рҹҹЎ гғһгӮӨгғҠгғј"; [[ "$RISK" != "high" ]] && RISK="medium"
                else
                  CHANGE="рҹҹў гғ‘гғғгғҒ"; [[ "$RISK" == "none" ]] && RISK="low"
                fi
                REPORT+="| \`$provider\` | \`$BASE_VER\` | \`$PR_VER\` | $CHANGE |"$'\n'
              fi
            done

            # base гҒ«гҒӮгҒЈгҒҰ PR гҒӢгӮүеүҠйҷӨгҒ•гӮҢгҒҹгғ—гғӯгғҗгӮӨгғҖгғј
            mapfile -t BASE_PROVIDERS < <(extract_providers "$BASE_LOCK")
            for provider in "${BASE_PROVIDERS[@]}"; do
              if ! grep -q "\"$provider\"" "$PR_LOCK"; then
                BASE_VER=$(awk "/\"$provider\"/{found=1} found && /version/{print; found=0}" "$BASE_LOCK" \
                  | head -1 | sed 's/.*= *"\(.*\)"/\1/')
                REPORT+="| \`$provider\` | \`$BASE_VER\` | (еүҠйҷӨ) | рҹ—‘пёҸ еүҠйҷӨ |"$'\n'
                RISK="high"
              fi
            done

            if [[ -z "$REPORT" ]]; then
              echo "status=unchanged" >> "$GITHUB_OUTPUT"
            else
              echo "status=changed" >> "$GITHUB_OUTPUT"
              echo "risk=$RISK" >> "$GITHUB_OUTPUT"
              {
                echo "report<<REPORT_EOF"
                echo "$REPORT"
                echo "REPORT_EOF"
              } >> "$GITHUB_OUTPUT"
            fi
          fi

          # Lock file гҒ®ж•ҙеҗҲжҖ§гғҒгӮ§гғғгӮҜ
          cp .terraform.lock.hcl lock_before.hcl
          terraform providers lock -platform=linux_amd64
          if diff -q lock_before.hcl .terraform.lock.hcl > /dev/null 2>&1; then
            echo "lock_consistent=true" >> "$GITHUB_OUTPUT"
          else
            echo "lock_consistent=false" >> "$GITHUB_OUTPUT"
            {
              echo "lock_diff<<DIFF_EOF"
              diff lock_before.hcl .terraform.lock.hcl || true
              echo "DIFF_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

          # зҸҫеңЁгҒ®гғҗгғјгӮёгғ§гғіжғ…е ұ
          {
            echo "versions<<VER_EOF"
            terraform version -json | python3 -m json.tool
            echo "VER_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build Report Body
        id: report
        if: github.event_name == 'pull_request'
        env:
          STATUS: ${{ steps.analyze.outputs.status }}
          RISK: ${{ steps.analyze.outputs.risk }}
          LOCK_OK: ${{ steps.analyze.outputs.lock_consistent }}
          PROVIDER_TABLE: ${{ steps.analyze.outputs.report }}
          LOCK_DIFF: ${{ steps.analyze.outputs.lock_diff }}
          VERSIONS: ${{ steps.analyze.outputs.versions }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          TEMPLATE=".github/ISSUE_TEMPLATE/dependency-check-body.md"
          WORK=$(mktemp)
          cp "$TEMPLATE" "$WORK"

          # гӮ»гӮҜгӮ·гғ§гғіеүҠйҷӨгғҳгғ«гғ‘гғј
          remove_section() { sed -i "/<!-- BEGIN:$1 -->/,/<!-- END:$1 -->/d" "$WORK"; }

          # в”Җв”Җ гғ—гғӯгғҗгӮӨгғҖгғјгӮ№гғҶгғјгӮҝгӮ№гҒ§дёҚиҰҒгӮ»гӮҜгӮ·гғ§гғігӮ’йҷӨеҺ» в”Җв”Җ
          case "$STATUS" in
            changed)   remove_section "provider-new"; remove_section "provider-unchanged" ;;
            new)       remove_section "provider-changed"; remove_section "provider-unchanged" ;;
            *)         remove_section "provider-changed"; remove_section "provider-new" ;;
          esac

          # в”Җв”Җ гғӘгӮ№гӮҜгғ¬гғҷгғ«гҒ§дёҚиҰҒгҒӘиӯҰе‘ҠгӮ’йҷӨеҺ» в”Җв”Җ
          case "${RISK:-none}" in
            high)   export RISK_BADGE='рҹ”ҙ High'; remove_section "risk-medium" ;;
            medium) export RISK_BADGE='рҹҹЎ Medium'; remove_section "risk-high" ;;
            *)      export RISK_BADGE='рҹҹў Low'; remove_section "risk-high"; remove_section "risk-medium" ;;
          esac

          # в”Җв”Җ Lock file ж•ҙеҗҲжҖ§ в”Җв”Җ
          if [[ "$LOCK_OK" == "true" ]]; then
            remove_section "lock-inconsistent"
          else
            remove_section "lock-ok"
            [[ -z "${LOCK_DIFF:-}" ]] && remove_section "lock-diff"
          fi

          # в”Җв”Җ гғҒгӮ§гғғгӮҜгғӘгӮ№гғҲ в”Җв”Җ
          if [[ "$STATUS" != "changed" ]]; then
            remove_section "checklist"
          elif [[ "$RISK" != "high" ]]; then
            remove_section "checklist-high"
          fi

          # гғһгғјгӮ«гғјгӮігғЎгғігғҲйҷӨеҺ»
          sed -i '/<!-- BEGIN:/d; /<!-- END:/d' "$WORK"

          # гғҮгғјгӮҝеӨүж•°гӮ’еұ•й–ӢпјҲжҢҮе®ҡеӨүж•°гҒ®гҒҝпјү
          export PROVIDER_TABLE LOCK_DIFF VERSIONS ACTOR
          BODY=$(envsubst '${RISK_BADGE} ${PROVIDER_TABLE} ${LOCK_DIFF} ${VERSIONS} ${ACTOR}' < "$WORK")

          {
            echo "body<<REPORT_BODY_EOF"
            echo "$BODY"
            echo "REPORT_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post Report to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          REPORT_BODY: ${{ steps.report.outputs.body }}
        with:
          script: |
            const body = process.env.REPORT_BODY;

            // ж—ўеӯҳгҒ® Dependency Check гӮігғЎгғігғҲгӮ’жӣҙж–°пјҲйҮҚиӨҮеӣһйҒҝпјү
            const { owner, repo } = context.repo;
            const marker = '## рҹ”Һ Dependency Check Report';
            const comments = await github.rest.issues.listComments({
              owner, repo, issue_number: context.issue.number, per_page: 100
            });
            const existing = comments.data.find(c => c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body: body.substring(0, 65536)
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: context.issue.number, body: body.substring(0, 65536)
              });
            }
