name: Drift Detection

on:
  schedule:
    # 毎日 09:00 JST (00:00 UTC)
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  issues: write

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true

jobs:
  detect:
    name: Detect Drift
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.BACKEND_CONTAINER }}" \
            -backend-config="key=alz.terraform.tfstate"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan (Drift Check)
        id: plan
        run: |
          set +e
          terraform plan -no-color -input=false -lock-timeout=60m -detailed-exitcode 2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Close Existing Issue (No Drift)
        if: steps.plan.outputs.exitcode == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'drift-detected',
              state: 'open',
            });
            for (const issue of issues.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '✅ ドリフトが解消されました（自動クローズ）',
              });
            }

      - name: Create or Update Issue (Drift Detected)
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let plan = fs.readFileSync('plan_output.txt', 'utf8');
            if (plan.length > 60000) {
              plan = plan.substring(0, 30000) + '\n\n... (truncated) ...\n\n' + plan.substring(plan.length - 30000);
            }

            const body = `## 🔍 構成ドリフトを検知しました

            Terraform の state と実際の Azure インフラに差分があります。
            手動変更やAzure側の自動更新が原因の可能性があります。

            ### Plan 出力
            \`\`\`
            ${plan}
            \`\`\`

            ### 対処方法
            - **意図した変更の場合**: Terraform コードを更新して PR を作成してください
            - **意図しない変更の場合**: \`terraform apply\` で state と一致させてください
            - **一時的な差分の場合**: 次回の検知で自動クローズされます

            *検知日時: ${new Date().toISOString()}*
            *Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}*`.replace(/^            /gm, '');

            // 既存の open Issue を検索
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'drift-detected',
              state: 'open',
            });

            if (issues.data.length > 0) {
              // 既存 Issue を更新
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: body,
              });
            } else {
              // 新規 Issue を作成
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🔍 構成ドリフト検知',
                body: body,
                labels: ['drift-detected'],
              });
            }

      - name: Plan Error
        if: steps.plan.outputs.exitcode == '1'
        run: |
          echo "::error::Terraform plan failed with an error"
          exit 1
