name: Drift Detection

on:
  schedule:
    # 毎日 09:00 JST (00:00 UTC)
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: terraform-state
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  issues: write

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true

jobs:
  detect:
    name: Detect Drift
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.9"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.BACKEND_CONTAINER }}" \
            -backend-config="key=alz.terraform.tfstate"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan (Drift Check)
        id: plan
        run: |
          set +e
          # -detailed-exitcode: 0=変更なし, 1=エラー, 2=変更あり（ドリフト）
          terraform plan -no-color -input=false -lock-timeout=60m -detailed-exitcode 2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Close Existing Issue (No Drift)
        if: steps.plan.outputs.exitcode == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'drift-detected',
              state: 'open',
            });
            for (const issue of issues.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '✅ ドリフトが解消されました（自動クローズ）',
              });
            }

      - name: Build Issue Body
        id: issue_body
        if: steps.plan.outputs.exitcode == '2'
        run: |
          set -euo pipefail

          PLAN=$(cat plan_output.txt)
          if [[ ${#PLAN} -gt 60000 ]]; then
            PLAN="${PLAN:0:30000}"$'\n\n'"... (truncated) ..."$'\n\n'"${PLAN: -30000}"
          fi

          export PLAN_OUTPUT="$PLAN"
          export DETECTED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          export RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BODY=$(envsubst '${PLAN_OUTPUT} ${DETECTED_AT} ${RUN_URL}' < .github/ISSUE_TEMPLATE/drift-detection-body.md)

          {
            echo "body<<DRIFT_BODY_EOF"
            echo "$BODY"
            echo "DRIFT_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or Update Issue (Drift Detected)
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/github-script@v7
        env:
          ISSUE_BODY: ${{ steps.issue_body.outputs.body }}
        with:
          script: |
            const body = process.env.ISSUE_BODY;
            const { owner, repo } = context.repo;
            const label = 'drift-detected';

            const issues = await github.rest.issues.listForRepo({
              owner, repo, labels: label, state: 'open',
            });

            if (issues.data.length > 0) {
              await github.rest.issues.update({
                owner, repo, issue_number: issues.data[0].number, body,
              });
            } else {
              await github.rest.issues.create({
                owner, repo,
                title: '🔍 構成ドリフト検知',
                body, labels: [label],
              });
            }

      - name: Plan Error
        if: steps.plan.outputs.exitcode == '1'
        run: |
          echo "::error::Terraform plan failed with an error"
          exit 1
