display_name: "test-aiml"
# subscription_id 省略 → 新規作成
workload_type: "Production"
management_group_id: "corp"
location: "japaneast"

tags:
  environment: "test"
  cost_center: "test-10007"
  owner: "platform-team"
  system_name: "test-aiml"
  architecture: "aiml-workspace"

alert_contacts:
  - name: "Test Owner"
    email_address: "test-owner@example.com"
  - name: "Test On-Call"
    email_address: "test-oncall@example.com"

resource_groups:
  network:
    name: "rg-test-aiml-network"
    location: "japaneast"
  ml:
    name: "rg-test-aiml-ml"
    location: "japaneast"
  data:
    name: "rg-test-aiml-data"
    location: "japaneast"

virtual_network:
  hub_key: "primary"
  name: "vnet-test-aiml"
  resource_group_name: "rg-test-aiml-network"
  address_space: ["10.204.0.0/23"]
  hub_peering_enabled: true
  use_hub_gateway: true
  subnets:
    - name: "snet-training"
      address_prefix: "10.204.0.0/24"
    - name: "snet-scoring"
      address_prefix: "10.204.1.0/25"
    - name: "snet-data"
      address_prefix: "10.204.1.128/26"
    - name: "snet-pe"
      address_prefix: "10.204.1.192/27"

firewall_rules:
  network_rules:
    - name: "AllowMLToStorage"
      protocols: ["TCP"]
      source_addresses: ["10.204.0.0/24", "10.204.1.0/25"]
      destination_addresses: ["10.204.1.128/26"]
      destination_ports: ["443"]
    - name: "AllowMLToKeyVault"
      protocols: ["TCP"]
      source_addresses: ["10.204.0.0/24", "10.204.1.0/25"]
      destination_addresses: ["10.204.1.192/27"]
      destination_ports: ["443"]
    - name: "AllowMLToAzureML"
      protocols: ["TCP"]
      source_addresses: ["10.204.0.0/24", "10.204.1.0/25"]
      destination_addresses: ["AzureMachineLearning"]
      destination_ports: ["443", "8787", "18881"]
    - name: "AllowMLToACR"
      protocols: ["TCP"]
      source_addresses: ["10.204.0.0/24", "10.204.1.0/25"]
      destination_addresses: ["10.204.1.192/27"]
      destination_ports: ["443"]
    - name: "AllowMLToBatch"
      protocols: ["TCP"]
      source_addresses: ["10.204.0.0/24"]
      destination_addresses: ["BatchNodeManagement.JapanEast"]
      destination_ports: ["443", "29876", "29877"]
  application_rules:
    - name: "AllowPythonPackages"
      source_addresses: ["10.204.0.0/24"]
      protocols:
        - type: "Https"
          port: 443
      destination_fqdns:
        - "pypi.org"
        - "files.pythonhosted.org"
        - "conda.anaconda.org"
        - "repo.anaconda.com"
        - "*.anaconda.com"
    - name: "AllowHuggingFace"
      source_addresses: ["10.204.0.0/24"]
      protocols:
        - type: "Https"
          port: 443
      destination_fqdns:
        - "huggingface.co"
        - "*.huggingface.co"
        - "cdn-lfs.huggingface.co"
    - name: "AllowAzureMLStudio"
      source_addresses: ["10.204.0.0/24"]
      protocols:
        - type: "Https"
          port: 443
      destination_fqdns:
        - "ml.azure.com"
        - "*.ml.azure.com"
        - "*.notebooks.azure.net"
        - "*.instances.azureml.net"
        - "*.api.azureml.ms"
    - name: "AllowDockerHub"
      source_addresses: ["10.204.0.0/24"]
      protocols:
        - type: "Https"
          port: 443
      destination_fqdns:
        - "*.docker.io"
        - "production.cloudflare.docker.com"
        - "*.docker.com"
