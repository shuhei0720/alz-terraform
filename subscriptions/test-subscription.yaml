display_name: "test-subscription"
subscription_id: "cf1eb480-2cdd-4222-a9c3-03a690fb19d2"
workload_type: "Production"
management_group_id: "corp"
location: "japaneast"

tags:
  environment: "test"
  cost_center: "test-12345"
  owner: "platform-team"

alert_contacts:
  - name: "Test Owner"
    email_address: "test-owner@example.com"
  - name: "Test On-Call"
    email_address: "test-oncall@example.com"

resource_groups:
  network:
    name: "rg-test-network"
    location: "japaneast"
  application:
    name: "rg-test-app"
    location: "japaneast"

virtual_network:
  hub_key: "primary"
  name: "vnet-test"
  resource_group_name: "rg-test-network"
  address_space: ["10.200.0.0/24"]
  hub_peering_enabled: true
  use_hub_gateway: true
  subnets:
    - name: "snet-app"
      address_prefix: "10.200.0.0/26"
    - name: "snet-data"
      address_prefix: "10.200.0.64/26"
    - name: "snet-web"
      address_prefix: "10.200.0.128/26"

firewall_rules:
  network_rules:
    - name: "AllowSQL"
      protocols: ["TCP"]
      source_addresses: ["10.200.0.0/26"]
      destination_addresses: ["10.200.0.64/26"]
      destination_ports: ["1433"]
  application_rules:
    - name: "AllowExternalAPI"
      source_addresses: ["10.200.0.0/26"]
      protocols:
        - type: "Https"
          port: 443
      destination_fqdns: ["api.example.com"]

# ポリシー免除（このサブスクリプション固有）
# scope 内の ${subscription_id} はこのサブスクリプション ID に自動変換されます

policy_exemptions:
  - name: "exempt-test-sub-keyvault-gr"
    policy_assignment: "Enforce-GR-KeyVault"
    scope: "/subscriptions/${subscription_id}"
    category: "Mitigated"
    display_name: "テスト環境 — KeyVault ガードレール免除"
    description: "テスト環境のため KeyVault ガードレールを一時免除"

  - name: "exempt-test-sub-subnet-private"
    policy_assignment: "Enforce-Subnet-Private"
    management_group_suffix: "landingzones"
    scope: "/subscriptions/${subscription_id}/resourceGroups/rg-test-network/providers/Microsoft.Network/virtualNetworks/vnet-test"
    category: "Waiver"
    display_name: "test-subscription VNet — Subnet Private 免除"
    description: >-
      既存サブネットの defaultOutboundAccess は lifecycle ignore_changes により
      Terraform で変更不可。新規サブネットは defaultOutboundAccess=false で準拠済み。

