display_name: "test-subscription"
subscription_id: "cf1eb480-2cdd-4222-a9c3-03a690fb19d2"
workload_type: "Production"
management_group_id: "corp"
location: "japaneast"

tags:
  environment: "test"
  cost_center: "test-12345"
  owner: "platform-team"

alert_contacts:
  - name: "Test Owner"
    email_address: "test-owner@example.com"
  - name: "Test On-Call"
    email_address: "test-oncall@example.com"

resource_groups:
  network:
    name: "rg-test-network"
    location: "japaneast"
  application:
    name: "rg-test-app"
    location: "japaneast"

virtual_network:
  hub_key: "primary"
  name: "vnet-test"
  resource_group_name: "rg-test-network"
  address_space: ["10.200.0.0/16"]
  hub_peering_enabled: true
  use_hub_gateway: true
  subnets:
    - name: "snet-app"
      address_prefix: "10.200.1.0/24"
    - name: "snet-data"
      address_prefix: "10.200.2.0/24"
    - name: "snet-web"
      address_prefix: "10.200.3.0/24"

firewall_rules:
  network_rules:
    - name: "AllowSQL"
      protocols: ["TCP"]
      source_addresses: ["10.200.1.0/24"]
      destination_addresses: ["10.200.2.0/24"]
      destination_ports: ["1433"]
  application_rules:
    - name: "AllowExternalAPI"
      source_addresses: ["10.200.1.0/24"]
      protocols:
        - type: "Https"
          port: 443
      destination_fqdns: ["api.example.com"]