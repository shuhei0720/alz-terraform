display_name: "test-online-web"
# subscription_id 省略 → 新規作成
workload_type: "Production"
management_group_id: "online"
location: "japaneast"

tags:
  environment: "test"
  cost_center: "test-10006"
  owner: "platform-team"
  system_name: "test-online-web"
  architecture: "online-web"

alert_contacts:
  - name: "Test Owner"
    email_address: "test-owner@example.com"
  - name: "Test On-Call"
    email_address: "test-oncall@example.com"

resource_groups:
  network:
    name: "rg-test-online-web-network"
    location: "japaneast"
  application:
    name: "rg-test-online-web-app"
    location: "japaneast"
  data:
    name: "rg-test-online-web-data"
    location: "japaneast"

virtual_network:
  hub_key: "primary"
  name: "vnet-test-online-web"
  resource_group_name: "rg-test-online-web-network"
  address_space: ["10.203.0.0/24"]
  hub_peering_enabled: true
  use_hub_gateway: false
  subnets:
    - name: "snet-frontend"
      address_prefix: "10.203.0.0/26"
    - name: "snet-backend"
      address_prefix: "10.203.0.64/26"
    - name: "snet-data"
      address_prefix: "10.203.0.128/27"
    - name: "snet-pe"
      address_prefix: "10.203.0.160/27"

firewall_rules:
  network_rules:
    - name: "AllowBackendToCosmos"
      protocols: ["TCP"]
      source_addresses: ["10.203.0.64/26"]
      destination_addresses: ["10.203.0.128/27"]
      destination_ports: ["443"]
    - name: "AllowBackendToRedis"
      protocols: ["TCP"]
      source_addresses: ["10.203.0.64/26"]
      destination_addresses: ["10.203.0.160/27"]
      destination_ports: ["6380"]
    - name: "AllowFrontendToBackend"
      protocols: ["TCP"]
      source_addresses: ["10.203.0.0/26"]
      destination_addresses: ["10.203.0.64/26"]
      destination_ports: ["443"]
    - name: "AllowAppToKeyVault"
      protocols: ["TCP"]
      source_addresses: ["10.203.0.0/26", "10.203.0.64/26"]
      destination_addresses: ["10.203.0.160/27"]
      destination_ports: ["443"]
  application_rules:
    - name: "AllowPaymentGateway"
      source_addresses: ["10.203.0.64/26"]
      protocols:
        - type: "Https"
          port: 443
      destination_fqdns:
        - "api.stripe.com"
        - "api.sendgrid.com"
    - name: "AllowOAuthProviders"
      source_addresses: ["10.203.0.64/26"]
      protocols:
        - type: "Https"
          port: 443
      destination_fqdns:
        - "accounts.google.com"
        - "graph.facebook.com"
        - "appleid.apple.com"
    - name: "AllowNpmRegistry"
      source_addresses: ["10.203.0.0/26"]
      protocols:
        - type: "Https"
          port: 443
      destination_fqdns:
        - "registry.npmjs.org"
