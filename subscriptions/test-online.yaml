display_name: "test-online"
# subscription_id を省略 → billing_scope_id を使って新規作成
workload_type: "Production"
management_group_id: "online"
location: "japaneast"

tags:
  environment: "test"
  cost_center: "test-99999"
  owner: "platform-team"

alert_contacts:
  - name: "Test Owner"
    email_address: "test-owner@example.com"
  - name: "Test On-Call"
    email_address: "test-oncall@example.com"

resource_groups:
  network:
    name: "rg-test-online-network"
    location: "japaneast"
  application:
    name: "rg-test-online-app"
    location: "japaneast"

virtual_network:
  hub_key: "primary"
  name: "vnet-test-online"
  resource_group_name: "rg-test-online-network"
  address_space: ["10.200.1.0/24"]
  hub_peering_enabled: true
  use_hub_gateway: false
  subnets:
    - name: "snet-frontend"
      address_prefix: "10.200.1.0/26"
    - name: "snet-backend"
      address_prefix: "10.200.1.64/26"
    - name: "snet-data"
      address_prefix: "10.200.1.128/26"

firewall_rules:
  network_rules:
    - name: "AllowBackendToData"
      protocols: ["TCP"]
      source_addresses: ["10.200.1.64/26"]
      destination_addresses: ["10.200.1.128/26"]
      destination_ports: ["1433"]
  application_rules:
    - name: "AllowExternalAPI"
      source_addresses: ["10.200.1.64/26"]
      protocols:
        - type: "Https"
          port: 443
      destination_fqdns: ["api.example.com"]
