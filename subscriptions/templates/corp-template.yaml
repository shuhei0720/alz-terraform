# =============================================================================
# Corp サブスクリプションテンプレート
# オンプレミス接続が必要なワークロード用（Corp 管理グループ配置）
# =============================================================================
#
# 使い方:
#   1. このファイルを subscriptions/ にコピー
#   2. ファイル名を任意の名前に変更（例: hr-system.yaml）
#   3. <...> のプレースホルダーをすべて書き換え
#   4. terraform plan で確認、terraform apply で適用
#
#   ※ provider や module ブロックの追加は不要です（azapi で自動処理）
#
# 特徴:
#   - Corp 管理グループ配置 → 企業ポリシーが適用される
#   - Hub ピアリング有効 → Azure Firewall 経由でオンプレと通信可能
#   - BGP 伝搬無効のルートテーブル → オンプレルートを直接学習しない
#   - GatewaySubnet に Spoke 行きルートが自動追加される
# =============================================================================

display_name: "<サブスクリプション表示名>"
subscription_id: "<サブスクリプション ID (GUID)>"
workload_type: "Production"
management_group_id: "corp"
location: "japaneast"

tags:
  environment: "<production|staging|development>"
  cost_center: "<コストセンター番号>"
  owner: "<所有チーム名>"
  system_name: "<システム名>"

# アラート通知先（このサブスクリプションのアラートを受信する担当者）
alert_contacts:
  - name: "<担当者名>"
    email_address: "<メールアドレス>"
  - name: "<担当者名>"
    email_address: "<メールアドレス>"

resource_groups:
  network:
    name: "rg-<システム名>-network"
    location: "japaneast"
  application:
    name: "rg-<システム名>-app"
    location: "japaneast"
  data:
    name: "rg-<システム名>-data"
    location: "japaneast"

virtual_network:
  name: "vnet-<システム名>"
  resource_group_name: "rg-<システム名>-network"
  address_space: ["<例: 10.201.0.0/16>"]
  hub_peering_enabled: true       # Hub ピアリング有効 → Firewall 経由でオンプレ接続
  use_hub_gateway: true           # ExpressRoute Gateway 経由でオンプレルートを受信
  subnets:
    - name: "snet-app"
      address_prefix: "<例: 10.201.1.0/24>"
    - name: "snet-data"
      address_prefix: "<例: 10.201.2.0/24>"
    - name: "snet-web"
      address_prefix: "<例: 10.201.3.0/24>"
