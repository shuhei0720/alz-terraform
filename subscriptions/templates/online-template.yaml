# =============================================================================
# Online サブスクリプションテンプレート
# インターネット公開アプリケーション用（Online 管理グループ配置）
# =============================================================================
#
# 使い方:
#   1. このファイルを subscriptions/ にコピー
#   2. ファイル名を任意の名前に変更（例: public-web.yaml）
#   3. <...> のプレースホルダーをすべて書き換え
#   4. terraform plan で確認、terraform apply で適用
#
#   ※ provider や module ブロックの追加は不要です（azapi で自動処理）
#
# サブスクリプションの扱い:
#   - subscription_id 未指定 → 新規作成（billing_scope_id 変数が必要）
#   - subscription_id 指定   → 既存サブスクリプションを使用
#
# 特徴:
#   - Online 管理グループ配置 → インターネット公開向けポリシーが適用される
#   - Hub ピアリング有効 → Azure Firewall 経由で外部通信を制御
#   - オンプレ接続不要 → use_hub_gateway: false
#   - BGP 伝搬無効のルートテーブル → オンプレルートを学習しない
# =============================================================================

display_name: "<サブスクリプション表示名>"
# subscription_id: "<サブスクリプション ID (GUID)>"  # 省略時は新規作成されます
workload_type: "Production"
management_group_id: "online"
location: "japaneast"

tags:
  environment: "<production|staging|development>"
  cost_center: "<コストセンター番号>"
  owner: "<所有チーム名>"
  system_name: "<システム名>"

# アラート通知先（このサブスクリプションのアラートを受信する担当者）
alert_contacts:
  - name: "<担当者名>"
    email_address: "<メールアドレス>"
  - name: "<担当者名>"
    email_address: "<メールアドレス>"

resource_groups:
  network:
    name: "rg-<システム名>-network"
    location: "japaneast"
  application:
    name: "rg-<システム名>-app"
    location: "japaneast"

virtual_network:
  hub_key: "primary"                      # ピアリング先 Hub キー（hub_virtual_networks のキー名）
  name: "vnet-<システム名>"
  resource_group_name: "rg-<システム名>-network"
  address_space: ["<例: 10.200.1.0/24>"]
  hub_peering_enabled: true       # Hub ピアリング有効 → Firewall 経由で外部通信制御
  use_hub_gateway: false          # オンプレ接続不要
  subnets:
    - name: "snet-frontend"
      address_prefix: "<例: 10.200.1.0/26>"
    - name: "snet-backend"
      address_prefix: "<例: 10.200.1.64/26>"
    - name: "snet-data"
      address_prefix: "<例: 10.200.1.128/26>"

# Azure Firewall ルール（サブスクリプション固有の穴あけ）
# 不要であれば firewall_rules セクションを丸ごと削除してください
firewall_rules:
  network_rules:
    - name: "AllowBackendToData"
      protocols: ["TCP"]
      source_addresses: ["<バックエンドサブネット CIDR>"]
      destination_addresses: ["<データサブネット CIDR>"]
      destination_ports: ["1433", "6380"]
  application_rules:
    - name: "AllowExternalAPI"
      source_addresses: ["<バックエンドサブネット CIDR>"]
      protocols:
        - type: "Https"
          port: 443
      destination_fqdns: ["<許可する FQDN>"]

# ポリシー免除（このサブスクリプション固有）
# 不要であれば policy_exemptions セクションを丸ごと削除してください
# scope 内の ${subscription_id} はこのサブスクリプション ID に自動変換されます
# management_group_suffix は省略可（management_group_id から自動推定）
#
# policy_exemptions:
#   - name: "exempt-<システム名>-<ポリシー名>"
#     policy_assignment: "<ポリシー割り当て名（例: Enforce-GR-Storage0）>"
#     scope: "/subscriptions/${subscription_id}/resourceGroups/<RG名>/providers/<リソースタイプ>/<リソース名>"
#     category: "Waiver"              # Waiver（免除）または Mitigated（軽減済み）
#     display_name: "<表示名>"
#     description: "<免除理由>"
#     # policy_definition_reference_ids:  # イニシアティブ内の特定ポリシーだけ免除する場合
#     #   - "<policyDefinitionReferenceId>"
