# 監査ポリシー: レビュー済み許容項目の免除
#
# Audit / AuditIfNotExists ポリシーの非準拠のうち、
# 許容リスクとして判断した項目を免除する。

exemptions:
  # -----------------------------------------------------------------------
  # Audit-ZoneResiliency（ルート MG — alz）
  # -----------------------------------------------------------------------
  # Hub ネットワークリソースのゾーン冗長化は再作成が必要で計画的メンテナンスとして
  # 将来実施予定。Storage SA は GRS で運用しており不変性ポリシーにより ZRS 変換不可。

  - name: exempt-zone-resiliency-connectivity
    policy_assignment: Audit-ZoneResiliency
    scope: ${connectivity_subscription_id}
    management_group_suffix: ""
    category: Waiver
    display_name: "Zone Resiliency — Connectivity サブスクリプション"
    description: >-
      Hub FW/ER Gateway/PIP のゾーン冗長化は再作成が必要。
      計画的メンテナンスとして将来実施予定。

  - name: exempt-zone-resiliency-management
    policy_assignment: Audit-ZoneResiliency
    scope: ${management_subscription_id}
    management_group_suffix: ""
    category: Waiver
    display_name: "Zone Resiliency — Management サブスクリプション"
    description: >-
      LAW Archive SA は GRS で運用。不変性ポリシーにより ZRS 変換不可。
      Terraform state SA は LRS で運用（コスト理由）。

  # -----------------------------------------------------------------------
  # Audit-UnusedResources（ルート MG — alz）
  # -----------------------------------------------------------------------
  - name: exempt-unused-pip-connectivity
    policy_assignment: Audit-UnusedResources
    scope: ${connectivity_subscription_id}
    management_group_suffix: ""
    category: Waiver
    display_name: "未使用 PIP — ER Gateway 用"
    description: >-
      ExpressRoute Gateway 用 PIP は ER 接続が有効化されれば使用される。
      connection_enabled = false の現状では未使用だが一時的な状態。

  # -----------------------------------------------------------------------
  # Audit-ResourceRGLocation（ルート MG — alz）
  # -----------------------------------------------------------------------
  - name: exempt-rg-location-connectivity
    policy_assignment: Audit-ResourceRGLocation
    scope: ${connectivity_subscription_id}
    management_group_suffix: ""
    category: Waiver
    display_name: "RG Location 不一致 — Network Watcher"
    description: >-
      Azure が自動作成する Network Watcher は RG と異なるリージョンに
      作成される仕様。NetworkWatcherRG (japaneast) 内の japanwest watcher。
