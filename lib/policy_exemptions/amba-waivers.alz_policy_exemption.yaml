# AMBA ポリシー免除
#
# AMBA DINE ポリシーの非準拠を免除する。
# Microsoft.AlertsManagement RP は登録済みだが、DINE 修復が未実行のため
# 一時的に免除。修復実行後に準拠状態になれば免除は不要だが残しても無害。

exemptions:
  # Deploy-AMBA-Notification（ルート MG — alz）
  - name: exempt-amba-notification
    policy_assignment: Deploy-AMBA-Notification
    scope: ${root_management_group_id}
    management_group_suffix: ""
    category: Mitigated
    display_name: "AMBA Notification — RP 登録済み・修復待ち"
    description: >-
      Microsoft.AlertsManagement RP は登録済み。
      Policy Remediation ワークフロー実行で AlertProcessing Rule がデプロイされる。

  # Deploy-AMBA-Management（alz-management MG）
  - name: exempt-amba-management
    policy_assignment: Deploy-AMBA-Management
    scope: ${management_subscription_id}
    management_group_suffix: management
    category: Mitigated
    display_name: "AMBA Management — Daily Cap アラート修復待ち"
    description: >-
      PR #94 で UAMI ロール割り当て追加済み。
      Policy Remediation 実行で Daily Cap アラートがデプロイされる。
