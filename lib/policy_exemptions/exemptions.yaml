# =============================================================================
# ポリシー免除定義
# =============================================================================
#
# 全てのグローバル免除をこのファイルで一元管理する。
# サブスクリプション固有の免除は subscriptions/<name>.yaml に記述。
# Hub VNet の免除のみ動的 (Terraform の for_each) のため HCL で管理。
#
# スコープ変数 (${var_name}) は policy-exemptions.tf の
# exemption_scope_vars で実値に解決される。
#
# 免除のスコープ指針:
#   リソース / RG スコープ — 影響範囲が限定的で安全
#   サブスクリプション / MG スコープ — 将来のリソースにも適用されるため原則禁止
#   MG スコープ + reference ID 限定 — 構造的に回避不可能な項目のみ許容
#
# Audit ポリシーの非準拠は免除せず可視化する方針。
# DINE 修復待ちは免除ではなく Policy Remediation で対応する。
#
# =============================================================================

exemptions:

  # =========================================================================
  # 1. ストレージアカウント — ガードレール + CMK
  # =========================================================================
  #
  # Terraform state SA と LAW Archive SA はどちらも基盤インフラ SA で、
  # ガードレール・CMK 強制の一部/全部を免除する必要がある。
  # スコープはリソース ID に限定されており、将来のリソースに影響しない。
  #
  # Enforce-GR-Storage0 の policyDefinitionReferenceId 一覧:
  #   Deny-Storage-CopyScope, Deny-Storage-ServicesEncryption,
  #   Deny-Storage-LocalUser, Deny-Storage-SFTP,
  #   Deny-Storage-NetworkAclsBypass, Deny-Storage-ResourceAccessRulesTenantId,
  #   Deny-Storage-ResourceAccessRulesResourceId,
  #   Deny-Storage-NetworkAclsVirtualNetworkRules,
  #   Deny-Storage-ContainerDeleteRetentionPolicy, Deny-Storage-CorsRules,
  #   Deny-Storage-Account-Encryption, Deny-Storage-Cross-Tenant,
  #   Deny-Storage-Shared-Key, Deny-Storage-Infra-Encryption,
  #   Deny-Storage-Classic, Dine-Storage-Threat-Protection,
  #   Deny-Storage-Restrict-NetworkRules, Deny-Storage-NetworkRules,
  #   Deny-Storage-Account-Keys-Expire,
  #   Modify-Storage-FileSync-PublicEndpoint,
  #   Modify-Blob-Storage-Account-PublicEndpoint,
  #   Modify-Storage-Account-PublicEndpoint

  # --- Terraform state SA ---
  - name: exempt-state-sa-storage-gr
    policy_assignment: Enforce-GR-Storage0
    management_group_suffix: platform
    scope: ${terraform_state_storage_account_id}
    category: Waiver
    display_name: "Terraform state SA — Storage ガードレール免除"
    description: >-
      State backend は GitHub Actions OIDC 経由で管理。
      SharedKey 制限・パブリックアクセス制御は Azure Portal で個別設定済み。

  - name: exempt-state-sa-cmk
    policy_assignment: Enforce-Encrypt-CMK0
    management_group_suffix: platform
    scope: ${terraform_state_storage_account_id}
    category: Waiver
    display_name: "Terraform state SA — CMK 免除"
    description: >-
      Microsoft-managed keys で運用。CMK はコスト・運用複雑性のトレードオフにより見送り。

  - name: exempt-state-sa-mcsb
    policy_assignment: Deploy-MCSB2-Monitoring
    management_group_suffix: ""
    scope: ${terraform_state_storage_account_id}
    category: Waiver
    display_name: "Terraform state SA — MCSB 免除"
    description: >-
      基盤 SA は CMK 未使用・SharedKey 利用・PrivateEndpoint 未構成など
      MCSB ストレージポリシーに構造的に準拠できないためリソーススコープで免除。

  - name: exempt-state-sa-asc
    policy_assignment: Deploy-ASC-Monitoring
    management_group_suffix: ""
    scope: ${terraform_state_storage_account_id}
    category: Waiver
    display_name: "Terraform state SA — ASC 免除"
    description: >-
      Deploy-MCSB2-Monitoring と重複する ASC ストレージポリシーについても
      同様にリソーススコープで免除。

  # --- LAW Archive SA ---
  - name: exempt-law-archive-sa-storage-gr
    policy_assignment: Enforce-GR-Storage0
    management_group_suffix: platform
    scope: ${law_archive_sa_id}
    category: Waiver
    display_name: "LAW Archive SA — Storage ガードレール免除"
    description: >-
      不変性ポリシー (WORM) 付き専用 SA。インフラ暗号化等の作成後変更不可設定があるため免除。

  - name: exempt-law-archive-sa-cmk
    policy_assignment: Enforce-Encrypt-CMK0
    management_group_suffix: platform
    scope: ${law_archive_sa_id}
    category: Waiver
    display_name: "LAW Archive SA — CMK 免除"
    description: >-
      Microsoft-managed keys で運用。CMK はコスト・運用複雑性のトレードオフにより見送り。

  - name: exempt-law-archive-sa-mcsb
    policy_assignment: Deploy-MCSB2-Monitoring
    management_group_suffix: ""
    scope: ${law_archive_sa_id}
    category: Waiver
    display_name: "LAW Archive SA — MCSB 免除"
    description: >-
      WORM 付き専用 SA は CMK 未使用・インフラ暗号化未設定など
      MCSB ストレージポリシーに構造的に準拠できないためリソーススコープで免除。

  - name: exempt-law-archive-sa-asc
    policy_assignment: Deploy-ASC-Monitoring
    management_group_suffix: ""
    scope: ${law_archive_sa_id}
    category: Waiver
    display_name: "LAW Archive SA — ASC 免除"
    description: >-
      Deploy-MCSB2-Monitoring と重複する ASC ストレージポリシーについても
      同様にリソーススコープで免除。

  # --- Terraform state SA: Zone Resiliency ---
  - name: exempt-state-sa-zone-resilient
    policy_assignment: Audit-ZoneResiliency
    management_group_suffix: ""
    scope: ${terraform_state_storage_account_id}
    category: Waiver
    display_name: "Terraform state SA — Zone Resiliency 免除"
    description: >-
      GRS（geo-redundant storage）で運用する設計判断。
      ゾーン冗長（ZRS/GZRS）は不要。

  # --- LAW Archive SA: Zone Resiliency ---
  - name: exempt-law-archive-sa-zone-resilient
    policy_assignment: Audit-ZoneResiliency
    management_group_suffix: ""
    scope: ${law_archive_sa_id}
    category: Waiver
    display_name: "LAW Archive SA — Zone Resiliency 免除"
    description: >-
      GRS（geo-redundant storage）で運用する設計判断。
      ゾーン冗長（ZRS/GZRS）は不要。

  # =========================================================================
  # 2. ブートストラップリソース — IaC Compliance
  # =========================================================================

  - name: exempt-terraform-bootstrap-iac
    policy_assignment: Assign-IaC-Compliance
    management_group_suffix: platform
    scope: ${terraform_state_rg_id}
    category: Waiver
    display_name: "rg-terraform-state — IaC Compliance 免除"
    description: >-
      Terraform state + GitHub Actions OIDC UAMI はブートストラップリソース
      （鶏と卵問題）。Terraform 管理外だが正当なインフラ前提リソース。

  # =========================================================================
  # 3. MCSB / ASC ベンチマーク — 構造的に回避不可能な項目のみ免除
  # =========================================================================
  #
  # 免除対象:
  #   カスタム RBAC ロール — ALZ 設計に必要なロール定義（構造的）
  #   Identity / Entra ID — Entra ID Access Reviews で別途管理（Azure Policy 管轄外）
  #   DDoS Protection     — DDoS Protection Plan 未契約（組織的コスト判断）
  #   NSG Flow Logs       — test サブの NSG のみ対象。Hub 内 NSG は別途管理
  #   MI フェデレーション  — GitHub Actions OIDC の正当な構成
  #   LAW パブリックアクセス — VNet 統合未構成（運用簡素化の設計判断）
  #   Saved Queries CMK   — Microsoft-managed keys で運用
  #   Defender for APIs   — 廃止予定機能
  #
  # 以下は免除しない（将来のリソースで検出されるべき）:
  #   Storage 関連 — 基盤 SA はリソーススコープで個別免除済み

  - name: exempt-mcsb-audit-waivers
    policy_assignment: Deploy-MCSB2-Monitoring
    scope: ${root_management_group_id}
    management_group_suffix: ""
    category: Waiver
    display_name: "MCSB Audit — 構造的に回避不可能な項目"
    description: >-
      ALZ 設計上のカスタム RBAC ロール、Entra ID 管理事項、組織的コスト判断項目、
      および現環境で構造的に準拠不可能な項目を reference ID 限定で免除。
    policy_definition_reference_ids:
      # カスタム RBAC ロール — ALZ 設計上の構造的要件
      - userbacrulesmonitoring
      # Identity / Entra ID — Azure Policy では対処不可、Entra ID Access Reviews で管理
      - identitydesignatemorethanoneownermonitoring
      - identitydesignatelessthanownersmonitoring
      - identityremovedeprecatedaccountmonitoringnew
      - identityremovedeprecatedaccountwithownerpermissionsmonitoringnew
      - identityremoveexternalaccountwithownerpermissionsmonitoringnew
      - identityremoveexternalaccountwithwritepermissionsmonitoringnew
      - identityremoveexternalaccountwithreadpermissionsmonitoringnew
      # DDoS Protection — 組織的コスト判断
      - vnetenableddosprotectionmonitoring
      - vnetsprotectedddos
      # NSG Flow Logs — test サブの NSG のみ対象
      - flowlogsconfiguredeverynsggroup
      # MI フェデレーション — GitHub Actions OIDC の正当な構成
      - mifederatedcredentialsfromallowedissuertypes
      # LAW パブリックアクセス — VNet 統合未構成（運用簡素化）
      - lawworkspacesblocklogingestionqueryingfrompublics
      # Saved Queries CMK — Microsoft-managed keys で運用
      - savedqueriesmonitorsavedcustomerstoragelogsencryption
      # Defender for APIs — 廃止予定機能
      - enabledefenderforapis

  - name: exempt-asc-audit-waivers
    policy_assignment: Deploy-ASC-Monitoring
    scope: ${root_management_group_id}
    management_group_suffix: ""
    category: Waiver
    display_name: "ASC Audit — 構造的に回避不可能な項目"
    description: >-
      Deploy-MCSB2-Monitoring と重複する ASC 監視項目のうち、
      構造的に回避不可能な項目のみ reference ID 限定で免除。
    policy_definition_reference_ids:
      # カスタム RBAC ロール
      - userbacrulesmonitoring
      # Identity / Entra ID
      - identitydesignatemorethanoneownermonitoring
      - identitydesignatelessthanownersmonitoring
      - identityremovedeprecatedaccountmonitoringnew
      - identityremovedeprecatedaccountwithownerpermissionsmonitoringnew
      - identityremoveexternalaccountwithownerpermissionsmonitoringnew
      - identityremoveexternalaccountwithwritepermissionsmonitoringnew
      - identityremoveexternalaccountwithreadpermissionsmonitoringnew
      # DDoS Protection
      - vnetenableddosprotectionmonitoring
      # Defender for APIs — 廃止予定機能
      - enabledefenderforapis
