# Terraform State ストレージアカウントのポリシー免除
#
# state backend は Terraform 自身が管理するインフラ前提リソースのため、
# ガードレールの一部ポリシーから除外が必要。
#
# policy_definition_reference_ids を省略するとイニシアティブ全体を免除。
# 特定ポリシーだけ免除したい場合は policyDefinitionReferenceId を列挙する。
#
# Enforce-GR-Storage0（= Enforce-Guardrails-Storage イニシアティブ）の
# policyDefinitionReferenceId 一覧:
#   - Deny-Storage-CopyScope
#   - Deny-Storage-ServicesEncryption
#   - Deny-Storage-LocalUser
#   - Deny-Storage-SFTP
#   - Deny-Storage-NetworkAclsBypass
#   - Deny-Storage-ResourceAccessRulesTenantId
#   - Deny-Storage-ResourceAccessRulesResourceId
#   - Deny-Storage-NetworkAclsVirtualNetworkRules
#   - Deny-Storage-ContainerDeleteRetentionPolicy
#   - Deny-Storage-CorsRules
#   - Deny-Storage-Account-Encryption
#   - Deny-Storage-Cross-Tenant
#   - Deny-Storage-Shared-Key
#   - Deny-Storage-Infra-Encryption
#   - Deny-Storage-Classic
#   - Dine-Storage-Threat-Protection
#   - Deny-Storage-Restrict-NetworkRules
#   - Deny-Storage-NetworkRules
#   - Deny-Storage-Account-Keys-Expire
#   - Modify-Storage-FileSync-PublicEndpoint
#   - Modify-Blob-Storage-Account-PublicEndpoint
#   - Modify-Storage-Account-PublicEndpoint

exemptions:
  # Storage ガードレール: イニシアティブ全体を免除
  # （SharedKey Deny, パブリックアクセス Modify, キーローテーション Deny 等
  #   すべてが state backend 運用と競合するため）
  - name: exempt-state-sa-storage-gr
    policy_assignment: Enforce-GR-Storage0
    management_group_suffix: platform
    scope: ${terraform_state_storage_account_id}
    category: Waiver
    display_name: "Terraform state SA — Storage ガードレール免除"
    description: >-
      State backend は GitHub Actions OIDC 経由で管理。
      SharedKey 制限・パブリックアクセス制御は Azure Portal で個別設定済み。
    # policy_definition_reference_ids:        # 省略 = イニシアティブ全体を免除
    #   - Deny-Storage-Shared-Key              # 特定ポリシーだけ免除する場合はここに列挙
    #   - Modify-Storage-Account-PublicEndpoint

  # CMK 強制: state SA は Microsoft-managed keys で運用
  - name: exempt-state-sa-cmk
    policy_assignment: Enforce-Encrypt-CMK0
    management_group_suffix: platform
    scope: ${terraform_state_storage_account_id}
    category: Waiver
    display_name: "Terraform state SA — CMK 免除"
    description: >-
      State backend は Microsoft-managed keys で運用。
      CMK 導入はコスト・運用複雑性のトレードオフにより見送り。
